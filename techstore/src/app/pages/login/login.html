<div class="ts-login">
  <div class="ts-login__card">

    <div class="ts-login__header">
      <div class="ts-login__icon">⚡</div>
      <h2 class="ts-login__title">TechStore</h2>
      <p class="ts-login__sub">Inicia sesión en tu cuenta</p>
    </div>

    <div *ngIf="error" class="alert alert-danger d-flex align-items-center gap-2 py-2">
      <span>⚠️</span> {{ error }}
    </div>

    <div class="ts-form">
      <div class="ts-form__group">
        <label class="ts-form__label">Correo electrónico</label>
        <input type="email" class="form-control" [(ngModel)]="email"
               placeholder="admin@techstore.com">
      </div>
      <div class="ts-form__group">
        <label class="ts-form__label">Contraseña</label>
        <input type="password" class="form-control" [(ngModel)]="password"
               placeholder="••••••••">
      </div>
      <button class="btn btn-warning w-100 py-2 mt-1" (click)="login()" [disabled]="cargando">
        <span *ngIf="cargando" class="spinner-border spinner-border-sm me-2"></span>
        {{ cargando ? 'Ingresando…' : 'Iniciar sesión' }}
      </button>
    </div>

    <p class="ts-login__hint">Demo: admin&#64;techstore.com · admin123</p>

  </div>
</div>
