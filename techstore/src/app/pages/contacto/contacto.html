<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <h2 class="fw-bold mb-4 text-center">📬 Contáctanos</h2>
      <div *ngIf="enviado" class="alert alert-success text-center">
        ✅ Mensaje enviado correctamente. Te responderemos pronto.
      </div>
      <div class="card shadow">
        <div class="card-body p-4">
          <div class="mb-3">
            <label class="form-label fw-bold">Nombre completo</label>
            <input type="text" class="form-control" [(ngModel)]="nombre" placeholder="Tu nombre">
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Correo electrónico</label>
            <input type="email" class="form-control" [(ngModel)]="email" placeholder="tu@email.com">
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Mensaje</label>
            <textarea class="form-control" rows="5" [(ngModel)]="mensaje" placeholder="Escribe tu consulta..."></textarea>
          </div>
          <button class="btn btn-warning w-100 fw-bold" (click)="enviarMensaje()">Enviar Mensaje</button>
        </div>
      </div>
    </div>
  </div>
</div>
