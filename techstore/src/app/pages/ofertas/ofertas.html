<div class="container py-5">
  <div class="text-center mb-5">
    <h2 class="fw-bold">🔥 Ofertas Especiales</h2>
    <p class="text-muted">Aprovecha los mejores descuentos por tiempo limitado</p>
  </div>
  <div class="row">
    <div class="col-sm-6 col-lg-4 mb-4" *ngFor="let producto of ofertas">
      <div class="card h-100 border-danger shadow">
        <div class="position-relative">
          <img [src]="producto.imagen" class="card-img-top" [alt]="producto.nombre" style="height:220px; object-fit:cover;">
          <span class="badge bg-danger position-absolute top-0 end-0 m-2 fs-6">🔥 OFERTA</span>
        </div>
        <div class="card-body">
          <span class="badge bg-secondary mb-1">{{ producto.categoria | uppercase }}</span>
          <h5 class="card-title">{{ producto.nombre }}</h5>
          <p class="text-muted">{{ producto.descripcion }}</p>
          <p class="text-danger fw-bold fs-4">{{ producto.precio | currency:'PEN':'S/ ' }}</p>
          <p class="text-muted small">Stock disponible: {{ producto.stock }}</p>
        </div>
        <div class="card-footer bg-white">
          <button class="btn btn-danger w-100">¡Comprar ahora!</button>
        </div>
      </div>
    </div>
  </div>
</div>
